---
name: "Nuget Update Labels"
on:
  push:
    branches:
      - "main"
    paths:
      - "template_config.yml"

jobs:
  update_backport_labels:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/setup-python@v6"
        with:
          python-version: "3.11"
      - name: "Configure Git with PhillipDiCarlo name and email"
        run: |
          git config --global user.name 'PhillipDiCarlo'
          git config --global user.email 'sasha-1221@hotmail.com'
      - name: "Install python dependencies"
        run: |
          pip install requests pyyaml
      - uses: "actions/checkout@v6"
      - name: "Update labels"
        run: |
          python3 .github/workflows/scripts/update_backport_labels.py
        env:
          GITHUB_TOKEN: "${{ secrets.RELEASE_TOKEN }}"
...
