---
name: "Nuget Nightly CI"
on:
  schedule:
    # * is a special character in YAML so you have to quote this string
    # runs at 3:00 UTC daily
    - cron: "00 3 * * *"
  workflow_dispatch:

defaults:
  run:
    working-directory: "pulp_nuget"

concurrency:
  group: "${{ github.ref_name }}-${{ github.workflow }}"
  cancel-in-progress: true

jobs:
  build:
    uses: "./.github/workflows/build.yml"

  test:
    needs: "build"
    uses: "./.github/workflows/test.yml"
    with:
      matrix_env: |
        [{"TEST": "pulp"}, {"TEST": "lowerbounds"}]

  changelog:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v6"
        with:
          fetch-depth: 0
          path: "pulp_nuget"

      - uses: "actions/setup-python@v6"
        with:
          python-version: "3.13"

      - name: "Install python dependencies"
        run: |
          pip install gitpython packaging toml

      - name: "Configure Git with PhillipDiCarlo name and email"
        run: |
          git config --global user.name 'PhillipDiCarlo'
          git config --global user.email 'sasha-1221@hotmail.com'

      - name: "Collect changes from all branches"
        run: |
          python .ci/scripts/collect_changes.py

      - name: "Create Pull Request"
        uses: "peter-evans/create-pull-request@v8"
        id: "create_pr_changelog"
        with:
          token: "${{ secrets.RELEASE_TOKEN }}"
          title: "Update Changelog"
          body: ""
          branch: "changelog/update"
          delete-branch: true
          path: "pulp_nuget"
      - name: "Mark PR automerge"
        working-directory: "pulp_nuget"
        run: |
          gh pr merge --rebase --auto "${{ steps.create_pr_changelog.outputs.pull-request-number }}"
        if: "steps.create_pr_changelog.outputs.pull-request-number"
        env:
          GH_TOKEN: "${{ secrets.RELEASE_TOKEN }}"
        continue-on-error: true
...
