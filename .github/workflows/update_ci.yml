---
name: "Nuget CI Update"
on:
  schedule:
    # * is a special character in YAML so you have to quote this string
    # runs at 19:30 UTC every Sunday
    - cron: "30 19 * * 0"
  workflow_dispatch:

jobs:
  update:
    runs-on: "ubuntu-latest"

    strategy:
      fail-fast: false

    steps:
      - uses: "actions/checkout@v6"
        with:
          fetch-depth: 0
          repository: "pulp/plugin_template"
          path: "plugin_template"

      - uses: "actions/setup-python@v6"
        with:
          python-version: "3.11"

      - name: "Install python dependencies"
        run: |
          pip install gitpython packaging -r plugin_template/requirements.txt

      - name: "Configure Git with PhillipDiCarlo name and email"
        run: |
          git config --global user.name 'PhillipDiCarlo'
          git config --global user.email 'sasha-1221@hotmail.com'
      - uses: "actions/checkout@v6"
        with:
          fetch-depth: 0
          path: "pulp_nuget"
          ref: "main"

      - name: "Run update"
        working-directory: "pulp_nuget"
        run: |
          ../plugin_template/scripts/update_ci.sh

      - name: "Create Pull Request for CI files"
        uses: "peter-evans/create-pull-request@v8"
        id: "create_pr_main"
        with:
          token: "${{ secrets.RELEASE_TOKEN }}"
          path: "pulp_nuget"
          committer: "PhillipDiCarlo <sasha-1221@hotmail.com>"
          author: "PhillipDiCarlo <sasha-1221@hotmail.com>"
          title: "Update CI files for branch main"
          branch: "update-ci/main"
          base: "main"
          delete-branch: true
      - name: "Mark PR automerge"
        working-directory: "pulp_nuget"
        run: |
          gh pr merge --rebase --auto "${{ steps.create_pr_main.outputs.pull-request-number }}"
        if: "steps.create_pr_main.outputs.pull-request-number"
        env:
          GH_TOKEN: "${{ secrets.RELEASE_TOKEN }}"
        continue-on-error: true
...
